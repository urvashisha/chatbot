<!DOCTYPE html>
<html>
<head>
  <title>Power BI Dashboard Chatbot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f7fa;
      text-align: center;
    }

    h1 {
      background-color: #2c3e50;
      color: white;
      padding: 15px;
      margin: 0;
    }

    p {
      margin: 10px;
      font-size: 16px;
    }

    .container {
      display: flex;
      height: calc(100vh - 80px);
    }

    .pdf {
      width: 70%;
      height: 100%;
    }

    .pdf iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .chat {
      width: 30%;
      background: #ffffff;
      border-left: 2px solid #ddd;
      padding: 10px;
    }
  </style>

</head>

<body>

<h1>Travel Dashboard Chatbot</h1>
<p>View dashboard and ask questions using AI</p>

<div class="container">

  <!-- PDF SECTION -->
  <div class="pdf">
    <iframe src="https://drive.google.com/file/d/11xDFV4bJGy-eeoT6M-7FNpu-TOLx-ikP/preview"></iframe>
  </div>

  <!-- CHATBOT SECTION -->
  <div class="chat">
    <script src='https://cdn.jotfor.ms/agent/embedjs/019d9b4f35597272a616a1b31b8768d4401d/embed.js'></script>
  </div>

</div>

</body>
</html>
